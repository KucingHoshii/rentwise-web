<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Car</title>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="basicStyle.css">
     <style>
        body {
             
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-radius: 8px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin: 10px 0 5px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="number"],
        input[type="file"],
        input[type="submit"] {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        input[type="submit"] {
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
     
        
    
    <!-- Nav Bar -->
    <nav>
        <img class="nav-logo" src="asset\sedan.png" alt="">
        <ul class="nav-bar">
            <li><a href="">Home</a></li>
            <li><a href="">Ride</a></li>
            <li><a href="">Services</a></li>
            <li><a href="">About</a></li>
        </ul>
        <div class="nav-button">
            <a href="signup.html" class="button1">Sign Up</a>
            <a href="signin.html" class="button">Sign In</a>
        </div>        
    </nav>
    <div class="container">
        <h1>Manage Car</h1>
       
        
        
        <form action="ManageCarServlet" method="post" enctype="multipart/form-data">
            <label for="carID">Car ID:</label>
            <input type="text" id="carID" name="carID">

            <label for="carType">Car Type:</label>
            <input type="text" id="carType" name="carType" required>

            <label for="model">Car Model:</label>
            <input type="text" id="model" name="model" required>

            <label for="seats">Number of Seats:</label>
            <input type="number" id="seats" name="seats" required>

            <label for="rate">Rate per Day:</label>
            <input type="number" step="0.01" id="rate" name="rate" required>

            <label for="image">Car Image:</label>
            <input type="file" id="image" name="image" accept="image/*">

            <input type="submit" value="Submit">
        </form>
    </div>
    <footer>
        <p>Copyright &copy; 2024 RentWise</p>
    </footer>
</body>
</html>
